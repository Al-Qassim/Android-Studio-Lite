name: Release APK

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --stacktrace -PuseDebugSigning=true

      - name: Stage APK
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk \
            "dist/AndroidStudioLite-${{ github.sha }}.apk"
          cp app/build/outputs/apk/release/app-release.apk \
            dist/AndroidStudioLite-latest.apk

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          body: |
            Automated build from `main` (`${{ github.sha }}`).

            Installable release APK (CI-signed with the debug keystore until a production signing key is configured).
          files: |
            dist/AndroidStudioLite-${{ github.sha }}.apk
            dist/AndroidStudioLite-latest.apk
          make_latest: true
          fail_on_unmatched_files: true
