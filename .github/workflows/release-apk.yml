name: Release APK

# Sideload APK releases — push (or merge) to this branch only; not on `main`.
on:
  push:
    branches: [release-apk]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Stage and verify APK
        run: |
          set -euo pipefail
          mkdir -p dist
          SRC=app/build/outputs/apk/release/app-release.apk
          test -f "$SRC"
          cp "$SRC" "dist/AndroidStudioLite-${{ github.sha }}.apk"
          cp "$SRC" dist/AndroidStudioLite-latest.apk

          # Fail the job if the artifact is unsigned or not a valid APK zip.
          unzip -t dist/AndroidStudioLite-latest.apk >/dev/null
          BUILD_TOOLS=$(ls -1 "$ANDROID_HOME/build-tools" | sort -V | tail -1)
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" verify --verbose \
            dist/AndroidStudioLite-latest.apk
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/aapt" dump badging \
            dist/AndroidStudioLite-latest.apk | tee /tmp/apk-badging.txt
          grep -q "sdkVersion:'26'" /tmp/apk-badging.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          body: |
            Automated build from `release-apk` (`${{ github.sha }}`).

            Installable release APK (debug-signed for sideload; `minSdk` 26 / Android 8.0+).
          files: |
            dist/AndroidStudioLite-${{ github.sha }}.apk
            dist/AndroidStudioLite-latest.apk
          make_latest: true
          fail_on_unmatched_files: true
